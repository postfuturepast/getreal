name: Refresh NSW Property Data

on:
  schedule:
    # Every Sunday at 2am AEST (Sunday 16:00 UTC)
    - cron: '0 16 * * 0'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Download and load NSW data
        env:
          SUPABASE_SECRET: ${{ secrets.SUPABASE_SECRET }}
        run: |
          python3 load_nsw_csv.py --download --clear --batch-size 500

      - name: Log completion
        run: echo "NSW data refresh complete — $(date)"
